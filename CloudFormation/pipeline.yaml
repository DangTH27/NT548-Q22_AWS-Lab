AWSTemplateFormatVersion: "2010-09-09"
Description: CodeCommit, CodeBuild, and CodePipeline automation for the Voting App CloudFormation stack.

Parameters:
  ProjectName:
    Type: String
    Default: nhom6-voting-cfn
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: Use lowercase letters, numbers, and hyphens only.

  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - staging
      - prod

  RepositoryName:
    Type: String
    Default: voting-app-cfn-source
    AllowedPattern: "^[A-Za-z0-9._-]+$"
    ConstraintDescription: Use letters, numbers, periods, underscores, or hyphens only.

  CreateCodeCommitRepository:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Set to false if the CodeCommit repository already exists.

  BranchName:
    Type: String
    Default: main

  PipelineArtifactBucketName:
    Type: String
    Default: nhom6-codepipeline-artifacts-275057777292-ap-southeast-1
    AllowedPattern: "^[a-z0-9.-]+$"
    ConstraintDescription: Use a globally unique S3 bucket name.

  CfnArtifactBucketName:
    Type: String
    Default: nhom6-cfn-artifacts-275057777292-ap-southeast-1
    AllowedPattern: "^[a-z0-9.-]+$"
    ConstraintDescription: Use a globally unique S3 bucket name.

  CreateArtifactBuckets:
    Type: String
    Default: "true"
    AllowedValues:
      - "true"
      - "false"
    Description: Set to false if both artifact buckets already exist.

  TargetStackName:
    Type: String
    Default: nhom6-voting-cfn-dev

  RunTaskcat:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Set to true only when you intentionally want Taskcat to create live test stacks.

  AttachTaskcatLabPermissions:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"
    Description: Set to true together with RunTaskcat=true to allow CodeBuild to create and delete lab resources.

Conditions:
  ShouldCreateCodeCommitRepository: !Equals
    - !Ref CreateCodeCommitRepository
    - "true"
  ShouldCreateArtifactBuckets: !Equals
    - !Ref CreateArtifactBuckets
    - "true"
  ShouldAttachTaskcatLabPermissions: !Equals
    - !Ref AttachTaskcatLabPermissions
    - "true"

Resources:
  SourceRepository:
    Type: AWS::CodeCommit::Repository
    Condition: ShouldCreateCodeCommitRepository
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      RepositoryName: !Ref RepositoryName
      RepositoryDescription: !Sub CloudFormation source for ${ProjectName} ${Environment}.

  PipelineArtifactBucket:
    Type: AWS::S3::Bucket
    Condition: ShouldCreateArtifactBuckets
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref PipelineArtifactBucketName
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Ref PipelineArtifactBucketName
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  CfnArtifactBucket:
    Type: AWS::S3::Bucket
    Condition: ShouldCreateArtifactBuckets
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Ref CfnArtifactBucketName
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      Tags:
        - Key: Name
          Value: !Ref CfnArtifactBucketName
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  CodeBuildLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub /aws/codebuild/${ProjectName}-${Environment}-cfn-build
      RetentionInDays: 14

  CodeBuildServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-codebuild-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codebuild.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: codebuild-base-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: WriteBuildLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub ${CodeBuildLogGroup.Arn}:*
              - Sid: ReadWritePipelineArtifacts
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:${AWS::Partition}:s3:::${PipelineArtifactBucketName}
                  - !Sub arn:${AWS::Partition}:s3:::${PipelineArtifactBucketName}/*
                  - !Sub arn:${AWS::Partition}:s3:::${CfnArtifactBucketName}
                  - !Sub arn:${AWS::Partition}:s3:::${CfnArtifactBucketName}/*
              - Sid: ValidateCloudFormationTemplates
                Effect: Allow
                Action:
                  - cloudformation:ValidateTemplate
                Resource: "*"
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  CodeBuildTaskcatLabPolicy:
    Type: AWS::IAM::Policy
    Condition: ShouldAttachTaskcatLabPermissions
    Properties:
      PolicyName: taskcat-lab-permissions
      Roles:
        - !Ref CodeBuildServiceRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: TaskcatCloudFormationAccess
            Effect: Allow
            Action:
              - cloudformation:CreateStack
              - cloudformation:UpdateStack
              - cloudformation:DeleteStack
              - cloudformation:Describe*
              - cloudformation:Get*
              - cloudformation:List*
              - cloudformation:ValidateTemplate
            Resource: "*"
          - Sid: TaskcatLabResourceAccess
            Effect: Allow
            Action:
              - ec2:*
              - elasticloadbalancing:*
              - iam:*
              - ssm:*
              - kms:DescribeKey
            Resource: "*"

  CodeBuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-cfn-build
      Description: Validates and packages Voting App CloudFormation templates.
      ServiceRole: !GetAtt CodeBuildServiceRole.Arn
      Artifacts:
        Type: CODEPIPELINE
      Source:
        Type: CODEPIPELINE
        BuildSpec: CloudFormation/buildspec-cfn.yml
      Environment:
        Type: LINUX_CONTAINER
        ComputeType: BUILD_GENERAL1_SMALL
        Image: aws/codebuild/standard:7.0
        PrivilegedMode: false
        EnvironmentVariables:
          - Name: AWS_REGION
            Value: !Ref AWS::Region
          - Name: CFN_ARTIFACT_BUCKET
            Value: !Ref CfnArtifactBucketName
          - Name: RUN_TASKCAT
            Value: !Ref RunTaskcat
      LogsConfig:
        CloudWatchLogs:
          Status: ENABLED
          GroupName: !Ref CodeBuildLogGroup
      TimeoutInMinutes: 60
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  CloudFormationDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-cfn-deploy-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: voting-app-cfn-deploy-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadTemplateArtifacts
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:ListBucket
                Resource:
                  - !Sub arn:${AWS::Partition}:s3:::${PipelineArtifactBucketName}
                  - !Sub arn:${AWS::Partition}:s3:::${PipelineArtifactBucketName}/*
                  - !Sub arn:${AWS::Partition}:s3:::${CfnArtifactBucketName}
                  - !Sub arn:${AWS::Partition}:s3:::${CfnArtifactBucketName}/*
              - Sid: ManageVotingAppInfrastructure
                Effect: Allow
                Action:
                  - cloudformation:*
                  - ec2:*
                  - elasticloadbalancing:*
                  - iam:*
                  - ssm:*
                  - kms:DescribeKey
                Resource: "*"
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  CodePipelineServiceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-codepipeline-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: codepipeline.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: codepipeline-policy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadCodeCommitSource
                Effect: Allow
                Action:
                  - codecommit:GetBranch
                  - codecommit:GetCommit
                  - codecommit:GetRepository
                  - codecommit:UploadArchive
                  - codecommit:GetUploadArchiveStatus
                  - codecommit:CancelUploadArchive
                Resource: !Sub arn:${AWS::Partition}:codecommit:${AWS::Region}:${AWS::AccountId}:${RepositoryName}
              - Sid: ReadWritePipelineArtifactBucket
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:GetObjectVersion
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:${AWS::Partition}:s3:::${PipelineArtifactBucketName}
                  - !Sub arn:${AWS::Partition}:s3:::${PipelineArtifactBucketName}/*
              - Sid: StartCodeBuild
                Effect: Allow
                Action:
                  - codebuild:StartBuild
                  - codebuild:BatchGetBuilds
                Resource: !GetAtt CodeBuildProject.Arn
              - Sid: DeployWithCloudFormation
                Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:DescribeChangeSet
                  - cloudformation:CreateChangeSet
                  - cloudformation:ExecuteChangeSet
                  - cloudformation:DeleteChangeSet
                  - cloudformation:ValidateTemplate
                  - cloudformation:SetStackPolicy
                Resource: "*"
              - Sid: PassCloudFormationDeployRole
                Effect: Allow
                Action: iam:PassRole
                Resource: !GetAtt CloudFormationDeployRole.Arn
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  CodePipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-cfn-pipeline
      RoleArn: !GetAtt CodePipelineServiceRole.Arn
      ArtifactStore:
        Type: S3
        Location: !If
          - ShouldCreateArtifactBuckets
          - !Ref PipelineArtifactBucket
          - !Ref PipelineArtifactBucketName
      Stages:
        - Name: Source
          Actions:
            - Name: CodeCommitSource
              ActionTypeId:
                Category: Source
                Owner: AWS
                Provider: CodeCommit
                Version: "1"
              Configuration:
                RepositoryName: !Ref RepositoryName
                BranchName: !Ref BranchName
                PollForSourceChanges: "false"
              OutputArtifacts:
                - Name: SourceOutput
              RunOrder: 1
        - Name: BuildAndValidate
          Actions:
            - Name: CodeBuildCfnChecks
              ActionTypeId:
                Category: Build
                Owner: AWS
                Provider: CodeBuild
                Version: "1"
              InputArtifacts:
                - Name: SourceOutput
              OutputArtifacts:
                - Name: BuildOutput
              Configuration:
                ProjectName: !Ref CodeBuildProject
              RunOrder: 1
        - Name: Deploy
          Actions:
            - Name: DeployCloudFormation
              ActionTypeId:
                Category: Deploy
                Owner: AWS
                Provider: CloudFormation
                Version: "1"
              InputArtifacts:
                - Name: BuildOutput
              Configuration:
                ActionMode: CREATE_UPDATE
                StackName: !Ref TargetStackName
                Capabilities: CAPABILITY_NAMED_IAM,CAPABILITY_AUTO_EXPAND
                RoleArn: !GetAtt CloudFormationDeployRole.Arn
                TemplatePath: BuildOutput::CloudFormation/packaged.yaml
                TemplateConfiguration: BuildOutput::CloudFormation/parameters/dev-pipeline.json
              RunOrder: 1
      Tags:
        - Key: Project
          Value: !Ref ProjectName
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation

  EventBridgePipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${Environment}-events-pipeline-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: start-pipeline-execution
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: codepipeline:StartPipelineExecution
                Resource: !Sub arn:${AWS::Partition}:codepipeline:${AWS::Region}:${AWS::AccountId}:${ProjectName}-${Environment}-cfn-pipeline

  CodeCommitChangeRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub ${ProjectName}-${Environment}-codecommit-pipeline-trigger
      Description: Starts the CloudFormation pipeline when the CodeCommit branch changes.
      EventPattern:
        source:
          - aws.codecommit
        detail-type:
          - CodeCommit Repository State Change
        resources:
          - !Sub arn:${AWS::Partition}:codecommit:${AWS::Region}:${AWS::AccountId}:${RepositoryName}
        detail:
          event:
            - referenceCreated
            - referenceUpdated
          referenceType:
            - branch
          referenceName:
            - !Ref BranchName
      State: ENABLED
      Targets:
        - Arn: !Sub arn:${AWS::Partition}:codepipeline:${AWS::Region}:${AWS::AccountId}:${ProjectName}-${Environment}-cfn-pipeline
          Id: !Sub ${ProjectName}-${Environment}-pipeline
          RoleArn: !GetAtt EventBridgePipelineRole.Arn

Outputs:
  RepositoryName:
    Description: CodeCommit repository used as the pipeline source.
    Value: !Ref RepositoryName

  RepositoryCloneUrlHttp:
    Description: HTTPS clone URL when this stack creates the CodeCommit repository.
    Value: !If
      - ShouldCreateCodeCommitRepository
      - !GetAtt SourceRepository.CloneUrlHttp
      - !Sub https://git-codecommit.${AWS::Region}.amazonaws.com/v1/repos/${RepositoryName}

  PipelineName:
    Description: Created CodePipeline name.
    Value: !Ref CodePipeline

  CodeBuildProjectName:
    Description: Created CodeBuild project name.
    Value: !Ref CodeBuildProject

  TargetStackName:
    Description: CloudFormation application stack managed by the pipeline.
    Value: !Ref TargetStackName

  PipelineArtifactBucketName:
    Description: S3 bucket used by CodePipeline for stage artifacts.
    Value: !Ref PipelineArtifactBucketName

  CfnArtifactBucketName:
    Description: S3 bucket used by CodeBuild for packaged nested templates.
    Value: !Ref CfnArtifactBucketName
